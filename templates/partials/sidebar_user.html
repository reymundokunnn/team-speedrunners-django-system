{% load static %}
<div class="side-panel">
    <div class="side-item-wrapper">
        <div class="side-item active" data-section="dashboard">
            <img src="{% static 'img/dashboard/side-0.png' %}" class="dashboard-sidebar-icon">
            <a href="javascript:void(0)">Dashboard</a>
        </div>
        <div class="side-item" data-section="requests">
            <img src="{% static 'img/dashboard/side-2.png' %}" class="dashboard-sidebar-icon">
            <a href="javascript:void(0)">My Requests</a>
        </div>
        <div class="side-item" data-section="tracker">
            <img src="{% static 'img/dashboard/side-3.png' %}" class="dashboard-sidebar-icon">
            <a href="javascript:void(0)">Status Tracker</a>
        </div>
        <div class="side-item" data-section="payments">
            <img src="{% static 'img/dashboard/side-4.png' %}" class="dashboard-sidebar-icon">
            <a href="javascript:void(0)">Payments</a>
        </div>
        <div class="side-item side-item-link" data-href="{% url 'edit_profile' %}">
            <img src="{% static 'img/dashboard/side-5.png' %}" class="dashboard-sidebar-icon">
            <a href="{% url 'edit_profile' %}">Edit Profile</a>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Add click handlers for sidebar navigation
    var sidebarItems = document.querySelectorAll('.side-item[data-section]');
    sidebarItems.forEach(function(item) {
        item.style.cursor = 'pointer';
        item.addEventListener('click', function(e) {
            e.preventDefault();
            var sectionId = this.getAttribute('data-section');
            console.log('User sidebar clicked, section:', sectionId);
            if (sectionId && typeof showDashboardSection === 'function') {
                showDashboardSection(sectionId);
            } else {
                console.error('showDashboardSection function not found');
            }
        });
    });
    
    // Handle external navigation links (like Edit Profile)
    var linkItems = document.querySelectorAll('.side-item[data-href]');
    linkItems.forEach(function(item) {
        item.style.cursor = 'pointer';
        item.addEventListener('click', function(e) {
            var href = this.getAttribute('data-href');
            if (href) {
                window.location.href = href;
            }
        });
    });
});
</script>
